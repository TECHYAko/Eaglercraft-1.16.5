<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Downloading Eaglercraft 1.16.5 (u1-beta)</title>
		<link type="image/png" rel="shortcut icon" href="favicon.png" />
		<style>
			* { box-sizing: border-box; }
			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #161616;
				color: #eeeeee;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}
			.card { width: min(460px, 90vw); text-align: center; }
			.title { font-size: 20px; font-weight: 700; margin-bottom: 18px; }
			#progressTrack { width: 100%; height: 10px; background: #2c2c2c; border-radius: 6px; overflow: hidden; }
			#progressBar { width: 0%; height: 100%; background: #5b9bd5; transition: width 0.3s ease-out; }
			#statusText { color: #aaaaaa; font-size: 13px; margin-top: 10px; }
			#backLink { color: #7fb2e0; font-size: 13px; display: inline-block; margin-top: 24px; }
			.errorText { color: #e08080; }
		</style>
	</head>
	<body>
		<div class="card">
			<div class="title">Preparing your download&hellip;</div>
			<div id="progressTrack"><div id="progressBar"></div></div>
			<div id="statusText">Starting...</div>
			<a id="backLink" href="index.html">&larr; Back to launcher</a>
		</div>
		<script>
			"use strict";

			// eagler: same reasoning as play.html's chunked-assets loader - the single-file offline
			// build (~381MB) repeatedly failed to upload as one continuous GitHub Release asset (both
			// via CLI tools and manual browser upload - hit the same connection failure every time on
			// this network), but pushing it to the repo in <100MB chunks via git succeeded reliably
			// (same as assets.epk). So instead of one giant download from a Release, this fetches all
			// the chunks same-origin (small individual requests, proven reliable) and reassembles them
			// into the exact original file bytes as a Blob, then triggers a normal browser download of
			// that Blob - the end result for the user is identical (one file lands in their Downloads
			// folder), just assembled client-side instead of stored as one physical file on GitHub.
			function setStatus(text, pct) {
				document.getElementById("statusText").textContent = text;
				if(typeof pct === "number") {
					document.getElementById("progressBar").style.width = Math.max(0, Math.min(100, pct)) + "%";
				}
			}

			async function prepareAndDownload() {
				var manifest = await (await fetch("offline_build/manifest.json")).json();
				var partCount = manifest.partCount;
				var totalBytes = manifest.totalBytes;
				var chunks = new Array(partCount);
				var loadedBytes = 0;
				for(var i = 0; i < partCount; ++i) {
					var resp = await fetch("offline_build/build.html.part" + i);
					var buf = await resp.arrayBuffer();
					chunks[i] = buf;
					loadedBytes += buf.byteLength;
					setStatus("Downloading part " + (i + 1) + " of " + partCount + " (" +
						Math.round(loadedBytes / 1e6) + " / " + Math.round(totalBytes / 1e6) + " MB)",
						5 + 90 * (loadedBytes / totalBytes));
				}
				setStatus("Assembling file...", 96);
				var blob = new Blob(chunks, { type: "text/html" });
				var blobUrl = URL.createObjectURL(blob);
				var a = document.createElement("a");
				a.href = blobUrl;
				a.download = "Eaglercraft 1.16.5 (u1-beta).html";
				document.body.appendChild(a);
				a.click();
				a.remove();
				setStatus("Done! Check your Downloads folder. If nothing happened, check your browser's download prompt/permissions.", 100);
			}

			prepareAndDownload().catch(function(err) {
				setStatus("Something went wrong: " + err, 0);
				document.getElementById("statusText").classList.add("errorText");
				console.error(err);
			});
		</script>
	</body>
</html>
